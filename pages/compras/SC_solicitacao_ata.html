<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitação de ATA</title>
    <link rel="stylesheet" href="../../style/global.css">
</head>
<body class="body_margin_bottom">
    <div>
        <button class="voltar" onclick="history.back()">
            <img src="../../assets/icons/seta.svg" alt="ícone de seta">
            <p>Voltar</p>
        </button>
    </div>

    <div class="conteudo">
        <div class="passo1">
            <h4>Passo 1</h4>
            <p class="line"></p>

            <p class="margin_none">Após realizar login, acesse o sistema de compras web</p>
            <div class="img_config">
                <img src="../../assets/imgGuias/img_compras/SC_01.png" alt="">
            </div>
        </div>

        <div class="passo2">
            <h4>Passo 2</h4>
            <p class="line"></p>

            <p class="margin_none">Menu > Solicitações > Solicitação de compra</p>
            <div class="img_config">
                <img src="../../assets/imgGuias/img_compras/SC_02.png" alt="">
            </div>
        </div>

        <div class="passo3">
            <h4>Passo 3</h4>
            <p class="line"></p> 

            <p class="margin_none">Crie uma nova solicitação no botão "Novo"</p>

            <div class="img_config">
                <img src="../../assets/imgGuias/img_compras/SC_03.png" alt="">
            </div>
        </div>

        <div class="passo4">
            <h4>Passo 4</h4>
            <p class="line"></p>

            <p class="margin_none">Na aba "Dados gerais", preencha os campos: </br>
            Ano, tipo: solicitação de ata</p>
            <div class="img_config">
                <img src="../../assets/imgGuias/img_compras/SC_09.png" alt="">
            </div>
        </div>

</body>
</html>
