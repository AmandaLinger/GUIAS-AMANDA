<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia fechamento de Folha</title>
    <link rel="stylesheet" href="../../../style/global.css">
</head>
<body class="body_margin_bottom">
    <div>
        <button class="voltar" onclick="history.back()">
            <img src="../../../assets/icons/seta.svg" alt="ícone de seta">
            <p>Voltar</p>
        </button>
    </div>

    <div class="conteudo">
        <div class="passo1">
            <h4>Passo 1</h4>
            <p class="line"></p>

            <p class="margin_none">Após realizar login, acesse o sistema de Recursos Humanos desktop</p>
            <div class="img_config">
                <img src="../../../assets/imgGuias/img_recursos_humanos/SRH_01.png" alt="">
            </div>
        </div>

        <div class="passo2">
            <h4>Passo 2</h4>
            <p class="line"></p>

            <p class="margin_none">Entre na tela de Encerramento/estorno</p>
            <div class="img_config">
                <img src="../../../assets/imgGuias/img_recursos_humanos/SRH_54.png" alt="">
            </div>
        </div>

        <div class="passo3">
            <h4>Passo 3</h4>
            <p class="line"></p>

            <p class="margin_none">Clique na lupa para localizar a folha desejada</p>
            <div class="img_config">
                <img src="../../assets/imgGuias/img_recursos_humanos/SRH_55.png" alt="">
            </div>
        </div>

        <div class="passo4">
            <h4>Passo 4</h4>
            <p class="line"></p>

            <p class="margin_none">Selecione a folha e clique em "Aceitar"</p>
            <div class="img_config">
                <img src="../../assets/imgGuias/img_recursos_humanos/SRH_50.png" alt="">
            </div>
        </div>

        <div class="passo5">
            <h4>Passo 5</h4>
            <p class="line"></p>

            <p class="margin_none">Preencha a data do encerramento e clique em "Encerra"</p>
            <div class="img_config">
                <img src="../../assets/imgGuias/img_recursos_humanos/SRH_56.png" alt="">
            </div>
        </div>
        
    </div>

</body>
