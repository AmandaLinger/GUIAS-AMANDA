<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia retorno eventos e-social</title>
    <link rel="stylesheet" href="../../../style/global.css">
</head>
<body class="body_margin_bottom">
    <div>
        <button class="voltar" onclick="history.back()">
            <img src="../../../assets/icons/seta.svg" alt="ícone de seta">
            <p>Voltar</p>
        </button>
    </div>

    <div class="conteudo">
        <div class="passo1">
            <h4>Passo 1</h4>
            <p class="line"></p>

            <p class="margin_none">Após realizar login, acesse o sistema de Recursos Humanos web</p>
            <div class="img_config">
                <img src="../../../assets/imgGuias/img_recursos_humanos/SRH_18.png" alt="">
            </div>
        </div>

        <div class="passo2">
            <h4>Passo 2</h4>
            <p class="line"></p>

            <p class="margin_none">Siga o caminho: Menu > E-social > Inconsistência folha</p>
            <div class="img_config">
                <img src="../../../assets/imgGuias/img_recursos_humanos/SRH_34.png" alt="">
            </div>
        </div>

        <div class="passo3">
            <h4>Passo 3</h4>
            <p class="line"></p>

            <p class="margin_none">Preencha os campos : "Período apuração", "INSS", "FGTS" e clique em "Gerar"</p>
            <div class="img_config">
                <img src="../../../assets/imgGuias/img_recursos_humanos/SRH_35.png" alt="">
            </div>
        </div>

    </div>

</body>
